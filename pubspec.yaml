name: shared_utils
description: "مكتبة أدوات مشتركة للمشاريع - تتضمن معالجة API، extensions، formatters، وأدوات مساعدة"

version: 2.8.2

homepage: https://github.com/AbberApp/shared_utils

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.9.2
  connectivity_plus: ^7.1.1
  web_socket_channel: ^3.0.3

  # File & Image Pickers
  file_picker: ^12.0.0-beta.2
  image_picker: ^1.2.2
  image_cropper: ^12.2.1

  # UI
  fluttertoast: ^9.0.0
  skeletonizer: ^2.1.3

  # Storage
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.2
  # ua_client_hints: ^1.7.0

  # Device Info
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0
  persistent_device_id: ^1.1.0

  # App Update
  in_app_update: ^4.2.5
  json_annotation: ^4.11.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
