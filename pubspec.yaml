name: shared_utils
description: "مكتبة أدوات مشتركة للمشاريع - تتضمن معالجة API، extensions، formatters، وأدوات مساعدة"

version: 2.3.1

homepage: https://github.com/AbberApp/shared_utils

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  web_socket_channel: ^3.0.3

  # Agora RTC - للمكالمات والبث المباشر
  agora_rtc_engine: ^6.5.3

  # Audio Session - إدارة جلسة الصوت
  audio_session: ^0.2.2

  # File & Image Pickers
  file_picker: ^10.3.10
  image_picker: ^1.2.1
  image_cropper: ^11.0.0

  # UI
  fluttertoast: ^9.0.0
  skeletonizer: ^2.1.0

  # Storage
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.2
  ua_client_hints: ^1.4.1

  # Device Info
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  persistent_device_id: ^1.1.0

  # App Update
  in_app_update: ^4.2.5
  json_annotation: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
